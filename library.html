<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文献库 - 小N学术站</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .library-container {
            padding: 20px;
        }
        
        .library-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: var(--card-bg);
            padding: 16px;
            border-radius: var(--radius);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        
        .stat-card.total { border-left: 3px solid #3b82f6; }
        .stat-card.pending { border-left: 3px solid #f59e0b; }
        .stat-card.completed { border-left: 3px solid #10b981; }
        
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--primary-color);
        }
        
        .stat-label {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }
        
        .library-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        
        .filter-bar {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
            align-items: center;
        }
        
        .filter-bar select,
        .filter-bar input {
            padding: 8px 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: var(--card-bg);
            font-size: 0.9rem;
        }
        
        .paper-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        
        /* 文献项 - 可滑动 */
        .paper-item {
            position: relative;
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
        }
        
        .paper-content {
            position: relative;
            z-index: 1;
            background: var(--card-bg);
            padding: 16px;
            display: flex;
            align-items: flex-start;
            gap: 12px;
            transition: transform 0.3s ease;
        }
        
        .paper-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 2px;
        }
        
        .paper-info {
            flex: 1;
            min-width: 0;
        }
        
        .paper-title {
            font-weight: 500;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        
        .paper-title:hover {
            color: var(--primary-color);
        }
        
        .lang-toggle {
            font-size: 0.75rem;
            padding: 2px 6px;
            background: var(--border-color);
            border-radius: 4px;
            cursor: pointer;
            flex-shrink: 0;
        }
        
        .paper-meta {
            font-size: 0.85rem;
            color: var(--text-secondary);
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }
        
        .paper-meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .paper-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
        }
        
        .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        
        .status-badge.yellow {
            background: rgba(245, 158, 11, 0.2);
            color: #d97706;
        }
        
        .status-badge.green {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }
        
        .status-badge.gray {
            background: rgba(107, 114, 128, 0.2);
            color: #6b7280;
        }
        
        /* 滑动操作 */
        .swipe-actions {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            pointer-events: none;
        }
        
        .swipe-action {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .swipe-left {
            background: rgba(239, 68, 68, 0.9);
        }
        
        .swipe-right {
            background: rgba(16, 185, 129, 0.9);
        }
        
        .paper-item.swiped-left .swipe-left {
            opacity: 1;
        }
        
        .paper-item.swiped-right .swipe-right {
            opacity: 1;
        }
        
        .paper-item.swiped-left .paper-content {
            transform: translateX(80px);
        }
        
        .paper-item.swiped-right .paper-content {
            transform: translateX(-80px);
        }
        
        /* 批量操作栏 */
        .batch-actions {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            padding: 12px 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
            display: none;
            gap: 12px;
            z-index: 100;
        }
        
        .batch-actions.active {
            display: flex;
        }
        
        /* 导入选项 */
        .import-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
        }
        
        .import-section h4 {
            margin: 0 0 16px 0;
        }
        
        .doi-import-area {
            display: flex;
            gap: 12px;
        }
        
        .doi-import-area textarea {
            flex: 1;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 0.9rem;
            resize: vertical;
            min-height: 80px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }
        
        /* 标题提示 */
        .title-hint {
            font-size: 0.7rem;
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        /* 语言指示器 */
        .lang-indicator {
            display: inline-block;
            padding: 2px 6px;
            background: var(--border-color);
            border-radius: 4px;
            font-size: 0.75rem;
            margin-right: 8px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">
                <span class="logo-icon">🧪</span>
                小N学术站
            </h1>
            <nav class="nav" id="navMenu">
                <a href="index.html" class="nav-link">
                    <span class="icon">🏠</span> 首页
                </a>
                <a href="weekly.html" class="nav-link">
                    <span class="icon">📅</span> 周报
                </a>
                <a href="library.html" class="nav-link active">
                    <span class="icon">📚</span> 文献库
                </a>
                <a href="papers.html" class="nav-link">
                    <span class="icon">📝</span> 文献卡片
                </a>
                <a href="vocabulary.html" class="nav-link">
                    <span class="icon">📖</span> 词汇本
                </a>
                <a href="settings.html" class="nav-link">
                    <span class="icon">⚙️</span> 设置
                </a>
            </nav>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
    </header>

    <main class="main">
        <div class="container library-container">
            <!-- 统计 -->
            <div class="library-stats">
                <div class="stat-card total">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">总文献</div>
                </div>
                <div class="stat-card pending">
                    <div class="stat-value" id="pendingCount">0</div>
                    <div class="stat-label">待制卡片</div>
                </div>
                <div class="stat-card completed">
                    <div class="stat-value" id="completedCount">0</div>
                    <div class="stat-label">已制卡片</div>
                </div>
            </div>
            
            <!-- DOI导入区域 -->
            <div class="import-section">
                <h4>🔗 导入DOI文献</h4>
                <div class="doi-import-area">
                    <textarea id="doiInput" placeholder="输入DOI或链接，每行一个，例如：
10.1038/s41560-023-01401-2
https://doi.org/10.1002/adma.202306789"></textarea>
                    <button class="btn btn-primary" onclick="importDois()" style="height: fit-content;">
                        📥 导入
                    </button>
                </div>
                <p style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 8px;">
                    💡 提示：左滑删除文献 | 右滑快速制作粗略卡片
                </p>
            </div>
            
            <!-- 操作栏 -->
            <div class="library-actions">
                <button class="btn btn-primary" onclick="batchMakeCards()" id="batchCardBtn" disabled>
                    📝 批量制作卡片
                </button>
                <button class="btn btn-outline" onclick="batchDelete()" id="batchDeleteBtn" disabled>
                    🗑️ 批量删除
                </button>
                <button class="btn btn-outline" onclick="selectAll()">
                    ✅ 全选
                </button>
            </div>
            
            <!-- 筛选 -->
            <div class="filter-bar">
                <select id="statusFilter" onchange="filterPapers()">
                    <option value="">全部状态</option>
                    <option value="pending">待制卡片</option>
                    <option value="completed">已制卡片</option>
                </select>
                <select id="journalFilter" onchange="filterPapers()">
                    <option value="">全部期刊</option>
                </select>
                <input type="text" id="searchInput" placeholder="搜索标题或DOI..." oninput="filterPapers()">
            </div>
            
            <!-- 文献列表 -->
            <div class="paper-list" id="paperList">
                <!-- 动态生成 -->
            </div>
            
            <!-- 空状态 -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="icon">📚</div>
                <p>文献库为空</p>
                <p>通过DOI导入添加文献</p>
            </div>
        </div>
    </main>
    
    <!-- 批量操作栏 -->
    <div class="batch-actions" id="batchActions">
        <span id="selectedCount">已选择 0 篇</span>
        <button class="btn btn-primary btn-sm" onclick="batchMakeCards()">制作卡片</button>
        <button class="btn btn-outline btn-sm" onclick="batchDelete()">删除</button>
        <button class="btn btn-outline btn-sm" onclick="clearSelection()">取消选择</button>
    </div>

    <footer class="footer">
        <div class="container">
            <p>© 2024 小N学术学习站</p>
        </div>
    </footer>

    <script src="js/ai-parser.js"></script>
    <script src="js/library.js"></script>
</body>
</html>
