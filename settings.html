<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API设置 - 小N学术站</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .settings-container {
            max-width: 700px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .settings-card {
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            padding: 32px;
        }
        
        .settings-header {
            text-align: center;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .settings-header h1 {
            font-size: 1.5rem;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .settings-header p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .settings-section {
            margin-bottom: 28px;
        }
        
        .settings-section h2 {
            font-size: 1.1rem;
            color: var(--text-primary);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }
        
        .form-group .hint {
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-top: 6px;
        }
        
        .input-wrapper {
            position: relative;
        }
        
        .input-wrapper input,
        .input-wrapper select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 1rem;
            transition: border-color 0.2s;
            background: var(--card-bg);
        }
        
        .input-wrapper input:focus,
        .input-wrapper select:focus {
            outline: none;
            border-color: var(--primary-color);
        }
        
        .toggle-visibility {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        
        .provider-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .provider-option {
            position: relative;
        }
        
        .provider-option input {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }
        
        .provider-option label {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px 12px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .provider-option input:checked + label {
            border-color: var(--primary-color);
            background: rgba(79, 70, 229, 0.05);
        }
        
        .provider-option .provider-icon {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }
        
        .provider-option .provider-name {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 0.9rem;
        }
        
        .model-select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 1rem;
            background: var(--card-bg);
        }
        
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        
        .btn-test {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius);
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-test.primary {
            background: var(--primary-color);
            color: white;
        }
        
        .btn-test.primary:hover {
            background: var(--primary-hover);
        }
        
        .btn-test.secondary {
            background: var(--secondary-color);
            color: white;
        }
        
        .test-result {
            margin-top: 16px;
            padding: 16px;
            border-radius: var(--radius);
            text-align: center;
            font-weight: 500;
            display: none;
        }
        
        .test-result.success {
            display: block;
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
            border: 1px solid var(--success-color);
        }
        
        .test-result.error {
            display: block;
            background: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
            border: 1px solid var(--error-color);
        }
        
        .test-result.loading {
            display: block;
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary-color);
            border: 1px solid var(--primary-color);
        }
        
        .status-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            margin-top: 16px;
        }
        
        .status-indicator.configured {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success-color);
        }
        
        .status-indicator.not-configured {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error-color);
        }
        
        .info-box {
            background: rgba(79, 70, 229, 0.05);
            border: 1px solid rgba(79, 70, 229, 0.2);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 24px;
        }
        
        .info-box h3 {
            font-size: 0.95rem;
            color: var(--primary-color);
            margin-bottom: 8px;
        }
        
        .info-box p {
            font-size: 0.85rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }
        
        .info-box a {
            color: var(--primary-color);
        }
        
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
        
        .back-link:hover {
            color: var(--primary-color);
        }
        
        @media (max-width: 600px) {
            .settings-card {
                padding: 20px;
            }
            
            .provider-selector {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .btn-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">
                <span class="logo-icon">🧪</span>
                小N学术站
            </h1>
            <nav class="nav" id="navMenu">
                <a href="index.html" class="nav-link">
                    <span class="icon">🏠</span> 首页
                </a>
                <a href="weekly.html" class="nav-link">
                    <span class="icon">📅</span> 周报
                </a>
                <a href="library.html" class="nav-link">
                    <span class="icon">📚</span> 文献库
                </a>
                <a href="papers.html" class="nav-link">
                    <span class="icon">📝</span> 文献卡片
                </a>
                <a href="vocabulary.html" class="nav-link">
                    <span class="icon">📖</span> 词汇本
                </a>
                <a href="settings.html" class="nav-link active">
                    <span class="icon">⚙️</span> 设置
                </a>
            </nav>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
    </header>

    <main class="main">
        <div class="settings-container">
            <a href="papers.html" class="back-link">
                <span>←</span> 返回文献卡片
            </a>
            
            <div class="settings-card">
                <div class="settings-header">
                    <h1>🔑 API设置</h1>
                    <p>选择AI服务商并配置API密钥以启用文献解析</p>
                    <div id="statusIndicator" class="status-indicator"></div>
                </div>
                
                <div class="settings-section">
                    <h2>🌐 选择API服务商</h2>
                    <div class="provider-selector" id="providerSelector">
                        <div class="provider-option">
                            <input type="radio" name="provider" id="providerSiliconflow" value="siliconflow">
                            <label for="providerSiliconflow">
                                <div class="provider-icon">⚡</div>
                                <div class="provider-name">硅基流动</div>
                            </label>
                        </div>
                        <div class="provider-option">
                            <input type="radio" name="provider" id="providerDeepseek" value="deepseek">
                            <label for="providerDeepseek">
                                <div class="provider-icon">🦉</div>
                                <div class="provider-name">DeepSeek</div>
                            </label>
                        </div>
                        <div class="provider-option">
                            <input type="radio" name="provider" id="providerQwen" value="qwen">
                            <label for="providerQwen">
                                <div class="provider-icon">🔮</div>
                                <div class="provider-name">通义千问</div>
                            </label>
                        </div>
                        <div class="provider-option">
                            <input type="radio" name="provider" id="providerDoubao" value="doubao">
                            <label for="providerDoubao">
                                <div class="provider-icon">🫛</div>
                                <div class="provider-name">豆包</div>
                            </label>
                        </div>
                        <div class="provider-option">
                            <input type="radio" name="provider" id="providerGemini" value="gemini">
                            <label for="providerGemini">
                                <div class="provider-icon">✨</div>
                                <div class="provider-name">Gemini</div>
                            </label>
                        </div>
                    </div>
                </div>
                
                <div id="providerInfo" class="info-box">
                    <h3>💡 获取API Key</h3>
                    <p id="providerHint">选择上方的API服务商查看详细说明</p>
                </div>
                
                <div class="settings-section">
                    <h2>🔑 API密钥</h2>
                    <div class="form-group">
                        <div class="input-wrapper">
                            <input type="password" id="apiKeyInput" placeholder="请输入API Key">
                            <button type="button" class="toggle-visibility" id="toggleKeyVisibility">👁️</button>
                        </div>
                        <p class="hint">API Key仅保存在本地浏览器，不会上传服务器</p>
                    </div>
                </div>
                
                <div class="settings-section">
                    <h2>🤖 选择模型</h2>
                    <div class="form-group">
                        <select id="modelSelect" class="model-select">
                            <option value="">请先选择API服务商</option>
                        </select>
                    </div>
                    <div class="form-group" id="customModelGroup" style="display: none;">
                        <label for="customModelInput">自定义模型ID</label>
                        <input type="text" id="customModelInput" placeholder="输入模型ID，如: ep-xxxx-xxxx">
                        <p class="hint">豆包需要在火山引擎控制台创建推理接入点</p>
                    </div>
                </div>
                
                <div class="settings-section">
                    <h2>📝 词汇提取设置</h2>
                    <div class="form-group">
                        <label for="vocabCountInput">每篇文章提取词汇数量</label>
                        <div class="input-wrapper">
                            <input type="number" id="vocabCountInput" min="5" max="50" value="20" placeholder="输入数量，如20">
                        </div>
                        <p class="hint">实际提取数量会在设定值上下浮动5个左右（默认20个）</p>
                    </div>
                </div>
                
                <div class="btn-group">
                    <button type="button" class="btn-test secondary" id="clearBtn">
                        🗑️ 清除设置
                    </button>
                    <button type="button" class="btn-test primary" id="saveBtn">
                        💾 保存设置
                    </button>
                    <button type="button" class="btn-test primary" id="testBtn">
                        🔗 测试连接
                    </button>
                </div>
                
                <div id="testResult" class="test-result"></div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2024 小N学术学习站</p>
        </div>
    </footer>

    <script src="js/ai-parser.js"></script>
    <script src="js/settings.js"></script>
</body>
</html>
