<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小N学术站 - 钙钛矿太阳能电池研究</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">
                <span class="logo-icon">🧪</span>
                小N学术站
            </h1>
            <nav class="nav" id="navMenu">
                <a href="index.html" class="nav-link active">
                    <span class="icon">🏠</span> 首页
                </a>
                <a href="weekly.html" class="nav-link">
                    <span class="icon">📅</span> 周报
                </a>
                <a href="papers.html" class="nav-link">
                    <span class="icon">📚</span> 文献卡片
                </a>
                <a href="vocabulary.html" class="nav-link">
                    <span class="icon">📝</span> 词汇本
                </a>
                <a href="sync.html" class="nav-link">
                    <span class="icon">🔄</span> 同步
                </a>
            </nav>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- Hero Section -->
            <section class="hero">
                <div class="hero-content">
                    <h2>欢迎来到小N的学术学习站</h2>
                    <p>专注钙钛矿太阳能电池研究 | 化学专业本科</p>
                </div>
            </section>

            <!-- Quick Stats -->
            <section class="section">
                <h3 class="section-title">
                    <span class="icon">📊</span>
                    学习概览
                </h3>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon">📄</div>
                        <div class="stat-value" id="paperCount">-</div>
                        <div class="stat-label">文献数量</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📝</div>
                        <div class="stat-value" id="wordCount">-</div>
                        <div class="stat-label">生词数量</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">✅</div>
                        <div class="stat-value" id="masteredCount">-</div>
                        <div class="stat-label">已掌握</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon">📅</div>
                        <div class="stat-value" id="weekCount">-</div>
                        <div class="stat-label">学习周数</div>
                    </div>
                </div>
            </section>

            <!-- Weekly Reports Preview -->
            <section class="section">
                <div class="section-header">
                    <h3 class="section-title">
                        <span class="icon">📅</span>
                        最新周报
                    </h3>
                    <a href="weekly.html" class="btn btn-outline btn-sm">查看全部 →</a>
                </div>
                <div id="recentReports" class="weekly-reports">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <!-- Recent Papers -->
            <section class="section">
                <div class="section-header">
                    <h3 class="section-title">
                        <span class="icon">📚</span>
                        最近文献
                    </h3>
                    <a href="papers.html" class="btn btn-outline btn-sm">查看全部 →</a>
                </div>
                <div id="recentPapers" class="papers-grid">
                    <div class="loading">加载中...</div>
                </div>
            </section>

            <!-- Quick Actions -->
            <section class="section">
                <h3 class="section-title">
                    <span class="icon">⚡</span>
                    快捷操作
                </h3>
                <div class="stats-grid">
                    <a href="weekly.html" class="stat-card" style="text-decoration: none;">
                        <div class="stat-icon">➕</div>
                        <div class="stat-value" style="font-size: 1.5rem;">新建周报</div>
                        <div class="stat-label">创建本周学术总结</div>
                    </a>
                    <a href="papers.html" class="stat-card" style="text-decoration: none;">
                        <div class="stat-icon">📥</div>
                        <div class="stat-value" style="font-size: 1.5rem;">导入文献</div>
                        <div class="stat-label">通过DOI或PDF导入</div>
                    </a>
                    <a href="vocabulary.html" class="stat-card" style="text-decoration: none;">
                        <div class="stat-icon">📖</div>
                        <div class="stat-value" style="font-size: 1.5rem;">开始学习</div>
                        <div class="stat-label">继续单词学习</div>
                    </a>
                </div>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2024 小N学术学习站 | 钙钛矿太阳能电池研究方向</p>
            <p class="footer-link">托管于 GitHub Pages</p>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
