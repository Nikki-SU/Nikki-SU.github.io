<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>首页 - 小N学术站</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">
                <span class="logo-icon">🧪</span>
                小N学术站
            </h1>
            <nav class="nav" id="navMenu">
                <a href="index.html" class="nav-link active">
                    <span>🏠</span> 首页
                </a>
                <a href="papers.html" class="nav-link">
                    <span>📚</span> 文献库
                </a>
                <a href="vocabulary.html" class="nav-link">
                    <span>📖</span> 学习区
                </a>
                <a href="settings.html" class="nav-link">
                    <span>⚙️</span> 设置
                </a>
            </nav>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- 页面标题 -->
            <div class="section-header">
                <h3 class="section-title">
                    <span>📡</span>
                    文献追踪
                </h3>
                <div style="display: flex; gap: 8px;">
                    <button class="btn btn-secondary" id="configBtn">
                        <span>⚙️</span> 追踪配置
                    </button>
                    <button class="btn btn-primary" id="trackBtn">
                        <span>🔍</span> 开始追踪
                    </button>
                </div>
            </div>

            <!-- 追踪状态卡片 -->
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon">📰</div>
                    <div class="stat-value" id="journalCount">0</div>
                    <div class="stat-label">追踪刊物</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">🔑</div>
                    <div class="stat-value" id="keywordCount">0</div>
                    <div class="stat-label">关键词</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📅</div>
                    <div class="stat-value" id="lastTrackingTime">--</div>
                    <div class="stat-label">上次追踪</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon">📝</div>
                    <div class="stat-value" id="totalResults">0</div>
                    <div class="stat-label">累计结果</div>
                </div>
            </div>

            <!-- 追踪进度区域 -->
            <div id="trackingProgress" class="card hidden" style="margin-bottom: 24px;">
                <div class="card-title">
                    <span>🔄</span> 追踪进度
                </div>
                <div class="tracking-progress">
                    <div class="progress">
                        <div class="progress-bar" id="trackingBar" style="width: 0%"></div>
                    </div>
                    <div style="display: flex; justify-content: space-between; margin-top: 8px;">
                        <span id="trackingStatus">准备中...</span>
                        <span id="trackingPercent">0%</span>
                    </div>
                </div>
                <div id="currentJournal" style="margin-top: 16px; padding: 12px; background: var(--bg); border-radius: 8px;">
                    等待开始...
                </div>
            </div>

            <!-- 追踪结果区域 -->
            <div id="trackingResults" class="card hidden" style="margin-bottom: 24px;">
                <div class="card-title">
                    <span>📊</span> 追踪结果
                    <button class="btn btn-sm btn-primary" id="importAllBtn" style="margin-left: auto;">
                        📥 全部导入
                    </button>
                </div>
                <div id="resultsList" class="list"></div>
            </div>

            <!-- 追踪历史 -->
            <div class="card">
                <div class="card-title">
                    <span>📜</span> 追踪历史
                </div>
                <div id="historyList" class="list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>暂无追踪记录</p>
                        <p class="text-muted">点击"开始追踪"获取最新文献</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 追踪配置模态框 -->
    <div id="configModal" class="modal hidden">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3>📡 追踪配置</h3>
                <button class="modal-close" id="closeConfigModal">×</button>
            </div>
            <div class="modal-body">
                <!-- 关键词配置 -->
                <div class="settings-section">
                    <div class="settings-section-title">🔑 关键词配置</div>
                    <div class="form-group">
                        <label class="form-label">添加关键词（支持 AND/OR/NOT）</label>
                        <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                            <input type="text" class="form-input" id="keywordInput" placeholder="输入关键词，如: perovskite AND solar">
                            <select class="form-select" id="keywordLogic" style="width: 120px;">
                                <option value="AND">AND</option>
                                <option value="OR">OR</option>
                                <option value="NOT">NOT</option>
                            </select>
                            <button class="btn btn-primary" id="addKeywordBtn">添加</button>
                        </div>
                        <div id="keywordTags" style="display: flex; flex-wrap: wrap; gap: 8px;"></div>
                    </div>
                </div>

                <!-- 刊物配置 -->
                <div class="settings-section">
                    <div class="settings-section-title">📰 选择追踪刊物</div>
                    <div id="journalList" class="list" style="max-height: 400px; overflow-y: auto;"></div>
                </div>

                <!-- 自动追踪设置 -->
                <div class="settings-section">
                    <div class="settings-section-title">⏰ 自动追踪</div>
                    <div class="settings-row">
                        <span class="settings-label">每周一自动追踪</span>
                        <label class="toggle-switch">
                            <input type="checkbox" id="autoTrackToggle">
                            <span class="toggle-slider"></span>
                        </label>
                    </div>
                </div>
            </div>
            <div class="modal-footer" style="padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px;">
                <button class="btn btn-secondary" id="cancelConfigBtn">取消</button>
                <button class="btn btn-primary" id="saveConfigBtn">保存配置</button>
            </div>
        </div>
    </div>

    <!-- 导入确认模态框 -->
    <div id="importModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📥 导入文献</h3>
                <button class="modal-close" id="closeImportModal">×</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 16px;">即将导入 <strong id="importCount">0</strong> 篇文献到文献库</p>
                <div class="form-group">
                    <label class="form-label">
                        <input type="checkbox" id="dedupToggle" checked>
                        自动去重（跳过已存在的文献）
                    </label>
                </div>
            </div>
            <div class="modal-footer" style="padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px;">
                <button class="btn btn-secondary" id="cancelImportBtn">取消</button>
                <button class="btn btn-success" id="confirmImportBtn">确认导入</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/tracking.js"></script>
</body>
</html>
