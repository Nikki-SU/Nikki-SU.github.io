<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生词本 - 小N学术学习站</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">🧪 小N学术站</h1>
            <nav class="nav">
                <a href="index.html" class="nav-link">首页</a>
                <a href="vocabulary.html" class="nav-link active">生词本</a>
                <a href="papers.html" class="nav-link">文献卡片</a>
            </nav>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <section class="section">
                <h3 class="section-title">📝 生词学习</h3>
                
                <div class="vocab-tabs">
                    <button class="tab-btn active" data-tab="study">生词本</button>
                    <button class="tab-btn" data-tab="wrong">错词本</button>
                    <button class="tab-btn" data-tab="mastered">已掌握</button>
                    <button class="tab-btn" data-tab="all">全部单词</button>
                </div>

                <!-- 生词本（学习区） -->
                <div id="studyMode" class="vocab-content">
                    <div class="study-stats-bar">
                        <div class="stat-item">
                            <span class="stat-num" id="newCount">0</span>
                            <span class="stat-label">生词</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-num" id="wrongCount">0</span>
                            <span class="stat-label">错词</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-num" id="masteredCount">0</span>
                            <span class="stat-label">已掌握</span>
                        </div>
                    </div>
                    
                    <div class="study-buttons" id="studyButtons">
                        <button class="btn btn-primary study-btn" id="newStudyBtn">
                            📚 新学 (<span id="newStudyCount">0</span>)
                        </button>
                        <button class="btn btn-secondary study-btn" id="reviewBtn">
                            🔄 复习 (<span id="reviewCount">0</span>)
                        </button>
                    </div>
                    
                    <div class="queue-info hidden" id="queueInfo"></div>
                    
                    <div class="study-header">
                        <div class="progress-info">
                            <span id="progressText">进度: 0/12</span>
                            <div class="progress-bar">
                                <div class="progress-fill" id="progressFill"></div>
                            </div>
                        </div>
                        <div class="study-stats">
                            <span>当前连续正确: <span id="currentStreak">0</span></span>
                            <span>今日已学: <span id="todayCount">0</span></span>
                        </div>
                    </div>

                    <div class="study-area" id="studyArea">
                        <p class="empty-message">🎯 点击上方按钮开始学习！</p>
                    </div>

                    <div class="study-hint" id="studyHint">
                        <p>选择「新学」学习新单词，或选择「复习」巩固已学内容</p>
                    </div>
                </div>

                <!-- 错词本 -->
                <div id="wrongMode" class="vocab-content hidden">
                    <p class="section-desc">累计错误3次及以上的单词</p>
                    <div class="wrong-list" id="wrongList">
                        <p class="empty-message">暂无错词本中的单词，太棒了！</p>
                    </div>
                </div>

                <!-- 已掌握列表 -->
                <div id="masteredMode" class="vocab-content hidden">
                    <p class="section-desc">连续答对12次的单词</p>
                    <div class="mastered-list" id="masteredList">
                        <p class="empty-message">暂无已掌握的单词，继续学习吧！</p>
                    </div>
                </div>

                <!-- 全部单词 -->
                <div id="allMode" class="vocab-content hidden">
                    <div class="filter-bar">
                        <select id="categoryFilter" class="filter-select">
                            <option value="">全部分类</option>
                            <option value="synthesis">合成类</option>
                            <option value="characterization">表征类</option>
                            <option value="mechanism">机理类</option>
                            <option value="application">应用类</option>
                        </select>
                        <input type="text" id="searchWords" class="search-input" placeholder="搜索单词...">
                    </div>
                    <div class="word-list" id="wordList">
                        <p class="empty-message">暂无单词数据</p>
                    </div>
                </div>
            </section>

            <section class="section">
                <h3 class="section-title">➕ 添加新单词</h3>
                <form id="addWordForm" class="add-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="word">英文单词 *</label>
                            <input type="text" id="word" required placeholder="如: perovskite">
                        </div>
                        <div class="form-group">
                            <label for="wordCn">中文释义 *</label>
                            <input type="text" id="wordCn" required placeholder="如: 钙钛矿">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="definition">释义/定义</label>
                            <input type="text" id="definition" placeholder="详细释义">
                        </div>
                        <div class="form-group">
                            <label for="category">分类</label>
                            <select id="category">
                                <option value="synthesis">合成类</option>
                                <option value="characterization">表征类</option>
                                <option value="mechanism">机理类</option>
                                <option value="application">应用类</option>
                                <option value="custom">自定义</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full">
                            <label for="example">例句</label>
                            <textarea id="example" rows="2" placeholder="英文例句（可选）"></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group full">
                            <label for="exampleCn">例句中文</label>
                            <input type="text" id="exampleCn" placeholder="例句中文翻译（可选）">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">添加单词</button>
                    <p class="form-hint">提示：本地添加的单词需要联系小科同步到云端</p>
                </form>
            </section>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>© 2024 小N学术学习站 | 钙钛矿太阳能电池研究方向</p>
        </div>
    </footer>

    <script src="js/vocabulary.js"></script>
</body>
</html>
