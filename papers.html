<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文献库 - 小N学术站</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* 双语开关样式 */
        .lang-switch {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            user-select: none;
        }
        .lang-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-light);
        }
        .lang-switch input {
            display: none;
        }
        .lang-slider {
            position: relative;
            width: 36px;
            height: 20px;
            background: var(--border);
            border-radius: 20px;
            transition: 0.3s;
        }
        .lang-slider::before {
            content: '';
            position: absolute;
            width: 16px;
            height: 16px;
            left: 2px;
            top: 2px;
            background: white;
            border-radius: 50%;
            transition: 0.3s;
        }
        .lang-switch input:checked + .lang-slider {
            background: var(--primary);
        }
        .lang-switch input:checked + .lang-slider::before {
            transform: translateX(16px);
        }
        /* 卡片详情样式 */
        .card-section {
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }
        .card-section:last-child {
            border-bottom: none;
            margin-bottom: 0;
        }
        .card-section h4 {
            margin-bottom: 10px;
            color: var(--primary);
            font-size: 15px;
        }
        .card-section p {
            line-height: 1.7;
            color: var(--text);
        }
        .card-section ul {
            padding-left: 20px;
            line-height: 1.8;
        }
        .card-section ul li {
            margin-bottom: 6px;
        }
        .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--text-light);
        }
        .card-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .vocab-list {
            display: grid;
            gap: 8px;
        }
        .vocab-item {
            background: var(--bg);
            padding: 12px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .vocab-item .word {
            font-weight: 600;
            color: var(--primary);
        }
        .vocab-item .cn {
            color: var(--text);
            margin-left: 8px;
        }
        .vocab-item .def {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 4px;
        }
        .vocab-item .ex {
            font-size: 12px;
            color: var(--text-light);
            font-style: italic;
            margin-top: 6px;
            padding: 6px 8px;
            background: rgba(74, 144, 217, 0.1);
            border-radius: 4px;
        }
        .vocab-item .ex strong {
            color: var(--primary);
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container">
            <h1 class="logo">
                <span class="logo-icon">🧪</span>
                小N学术站
            </h1>
            <nav class="nav" id="navMenu">
                <a href="index.html" class="nav-link">
                    <span>🏠</span> 首页
                </a>
                <a href="papers.html" class="nav-link active">
                    <span>📚</span> 文献库
                </a>
                <a href="vocabulary.html" class="nav-link">
                    <span>📖</span> 词汇本
                </a>
                <a href="settings.html" class="nav-link">
                    <span>⚙️</span> 设置
                </a>
            </nav>
            <button class="menu-toggle" id="menuToggle">☰</button>
        </div>
    </header>

    <main class="main">
        <div class="container">
            <!-- 页面标题 -->
            <div class="section-header">
                <h3 class="section-title">
                    <span>📚</span>
                    文献库 & 卡片
                </h3>
            </div>

            <!-- Tabs -->
            <div class="tabs">
                <button class="tab-btn active" data-tab="library">
                    <span>📚</span> 文献库
                </button>
                <button class="tab-btn" data-tab="cards">
                    <span>🃏</span> 文献卡片
                </button>
            </div>

            <!-- 文献库 Tab -->
            <div id="libraryTab" class="tab-content active">
                <!-- 添加文献区域 -->
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-title">
                        <span>➕</span> 添加文献
                    </div>
                    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                        <input type="text" class="form-input" id="doiInput" placeholder="输入DOI添加文献，如: 10.1000/xyz123" style="flex: 1; min-width: 200px;">
                        <button class="btn btn-primary" id="addDoiBtn">添加</button>
                        <button class="btn btn-secondary" id="manualAddBtn">手动输入</button>
                    </div>
                </div>

                <!-- 筛选区域 -->
                <div class="filter-bar">
                    <select class="form-select" id="libraryFilter" style="min-width: 150px;">
                        <option value="">全部文献</option>
                        <option value="week">本周新增</option>
                        <option value="month">本月新增</option>
                    </select>
                    <input type="text" class="form-input" id="librarySearch" placeholder="搜索标题、作者..." style="min-width: 200px;">
                    <button class="btn btn-outline" id="libraryLangBtn" style="min-width: 60px;">中</button>
                    <button class="btn btn-secondary" id="refreshLibraryBtn">🔄 刷新</button>
                </div>

                <!-- 文献列表 -->
                <div id="libraryList" class="list">
                    <div class="empty-state">
                        <div class="empty-state-icon">📭</div>
                        <p>文献库为空</p>
                        <p class="text-muted">通过追踪或手动添加文献</p>
                    </div>
                </div>
            </div>

            <!-- 文献卡片 Tab -->
            <div id="cardsTab" class="tab-content">
                <!-- 导入卡片区域 -->
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-title">
                        <span>📥</span> 导入文献卡片
                    </div>
                    <div class="form-group">
                        <label class="form-label">粘贴JSON数据</label>
                        <textarea class="form-textarea" id="importJsonData" placeholder="直接粘贴JSON格式的文献卡片数据..." rows="6"></textarea>
                    </div>
                    <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                        <button class="btn btn-primary" id="importJsonBtn">
                            <span>✅</span> 导入JSON数据
                        </button>
                        <button class="btn btn-secondary" id="importCardBtn">
                            <span>📁</span> 选择JSON文件
                        </button>
                        <input type="file" id="cardFileInput" accept=".json" style="display: none;">
                    </div>
                </div>
                
                <!-- AI生成卡片区域 -->
                <div class="card" style="margin-bottom: 24px;">
                    <div class="card-title">
                        <span>✨</span> AI 生成卡片
                    </div>
                    <div class="form-group">
                        <label class="form-label">选择文献（可选）</label>
                        <select class="form-select" id="paperSelect">
                            <option value="">-- 选择文献 --</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">自定义摘要（可选）</label>
                        <textarea class="form-textarea" id="customAbstract" placeholder="粘贴文献摘要或关键段落，AI将自动解析生成卡片..."></textarea>
                    </div>
                    <div style="display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px;">
                        <button class="btn btn-primary" id="generateCardBtn">
                            <span>🤖</span> AI 生成卡片
                        </button>
                    </div>
                    <div id="generatingHint" class="text-muted" style="margin-top: 8px; font-size: 0.85rem;">
                        配置API后可以使用AI解析功能
                    </div>
                </div>

                <!-- 卡片列表 -->
                <div id="cardList" class="card-grid">
                    <div class="empty-state">
                        <div class="empty-state-icon">🃏</div>
                        <p>暂无文献卡片</p>
                        <p class="text-muted">使用AI生成或手动创建卡片</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 手动添加模态框 -->
    <div id="manualAddModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📝 手动添加文献</h3>
                <button class="modal-close" id="closeManualAddModal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label class="form-label">中文标题 *</label>
                    <input type="text" class="form-input" id="manualTitleCn" placeholder="输入中文标题">
                </div>
                <div class="form-group">
                    <label class="form-label">英文标题</label>
                    <input type="text" class="form-input" id="manualTitleEn" placeholder="输入英文标题">
                </div>
                <div class="form-group">
                    <label class="form-label">DOI</label>
                    <input type="text" class="form-input" id="manualDoi" placeholder="输入DOI，如: 10.1000/xyz123">
                </div>
                <div class="form-group">
                    <label class="form-label">作者</label>
                    <input type="text" class="form-input" id="manualAuthors" placeholder="作者列表，用逗号分隔">
                </div>
                <div class="form-group">
                    <label class="form-label">年份</label>
                    <input type="number" class="form-input" id="manualYear" placeholder="如: 2024">
                </div>
                <div class="form-group">
                    <label class="form-label">摘要</label>
                    <textarea class="form-textarea" id="manualAbstract" placeholder="文献摘要"></textarea>
                </div>
            </div>
            <div class="modal-footer" style="padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 8px;">
                <button class="btn btn-secondary" id="cancelManualAddBtn">取消</button>
                <button class="btn btn-primary" id="confirmManualAddBtn">添加</button>
            </div>
        </div>
    </div>

    <!-- 卡片详情模态框 -->
    <div id="cardDetailModal" class="modal hidden">
        <div class="modal-content modal-lg">
            <div class="modal-header">
                <h3 id="cardDetailTitle">文献卡片</h3>
                <div style="display: flex; align-items: center; gap: 12px;">
                    <label class="lang-switch">
                        <span class="lang-label">EN</span>
                        <input type="checkbox" id="cardLangSwitch" onchange="toggleCardLang()">
                        <span class="lang-slider"></span>
                        <span class="lang-label">中</span>
                    </label>
                    <button class="modal-close" id="closeCardDetailModal">×</button>
                </div>
            </div>
            <div class="modal-body" id="cardDetailBody">
                <!-- 动态内容 -->
            </div>
            <div class="modal-footer" style="padding: 16px 20px; border-top: 1px solid var(--border); display: flex; justify-content: space-between;">
                <button class="btn btn-danger" id="deleteCardBtn">🗑️ 删除</button>
                <button class="btn btn-secondary" id="closeCardDetailBtn">关闭</button>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script src="js/papers.js"></script>
</body>
</html>
